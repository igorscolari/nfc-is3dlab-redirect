<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>is-3D Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:   #e03030;
      --dark:  #111213;
      --mid:   #1c1e20;
      --light: #c8cdd4;
      --white: #f0f2f4;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* Grid de fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(224,48,48,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(224,48,48,.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 8s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    /* Brilho central */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(224,48,48,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 40px 40px;
      background: var(--mid);
      border: 1px solid rgba(224,48,48,.25);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 24px 80px rgba(0,0,0,.6),
        0 0 40px rgba(224,48,48,.08);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
      max-width: 320px;
      width: 90vw;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Detalhe de canto superior esquerdo */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 24px; height: 24px;
      border-top: 2px solid var(--red);
      border-left: 2px solid var(--red);
      border-radius: 4px 0 0 0;
    }

    /* Detalhe de canto inferior direito */
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 24px; height: 24px;
      border-bottom: 2px solid var(--red);
      border-right: 2px solid var(--red);
      border-radius: 0 0 4px 0;
    }

    .logo-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      animation: logoIn .6s .1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(224,48,48,.35);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(224,48,48,.15);
      animation: pulse 2s .4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.06); opacity: .5; }
    }

    .logo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .text-block {
      text-align: center;
      animation: textIn .6s .2s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      font-weight: 300;
      color: var(--light);
      letter-spacing: .05em;
    }

    .dots {
      display: flex;
      gap: 6px;
      animation: dotsIn .4s .3s both;
    }

    @keyframes dotsIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--red);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; background: rgba(224,48,48,.6); }
    .dot:nth-child(3) { animation-delay: .30s; background: rgba(224,48,48,.3); }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    .status {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: .15em;
      color: rgba(200,205,212,.35);
      text-transform: uppercase;
      animation: textIn .6s .35s both;
    }
  </style>
</head>

<script>
  var INSTA_USER = 'is3dlab';
  var INSTA_WEB  = 'https://instagram.com/' + INSTA_USER;
  var ua = navigator.userAgent || '';

  function goWeb() { window.location.replace(INSTA_WEB); }

  if (/android/i.test(ua)) {
    // Tenta intent nativo do Android (abre app com fallback para browser)
    window.location.replace(
      'intent://instagram.com/' + INSTA_USER +
      '#Intent;scheme=https;package=com.instagram.android;' +
      'S.browser_fallback_url=' + encodeURIComponent(INSTA_WEB) + ';end'
    );
  } else if (/iphone|ipad|ipod/i.test(ua)) {
    // Deep link iOS; fallback para web após 1.6s caso app não esteja instalado
    window.location.replace('instagram://user?username=' + INSTA_USER);
    setTimeout(goWeb, 1600);
  } else {
    goWeb();
  }
</script>
