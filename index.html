<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>is-3D Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:   #e03030;
      --dark:  #111213;
      --mid:   #1c1e20;
      --light: #c8cdd4;
      --white: #f0f2f4;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(224,48,48,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(224,48,48,.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 8s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(224,48,48,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 48px 40px 40px;
      background: var(--mid);
      border: 1px solid rgba(224,48,48,.25);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 24px 80px rgba(0,0,0,.6),
        0 0 40px rgba(224,48,48,.08);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
      max-width: 320px;
      width: 90vw;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 24px; height: 24px;
      border-top: 2px solid var(--red);
      border-left: 2px solid var(--red);
      border-radius: 4px 0 0 0;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 24px; height: 24px;
      border-bottom: 2px solid var(--red);
      border-right: 2px solid var(--red);
      border-radius: 0 0 4px 0;
    }

    .logo-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      animation: logoIn .6s .1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(224,48,48,.35);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(224,48,48,.15);
      animation: pulse 2s .4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.06); opacity: .5; }
    }

    .logo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .text-block {
      text-align: center;
      animation: textIn .6s .2s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      font-weight: 300;
      color: var(--light);
      letter-spacing: .05em;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--red);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      animation: textIn .6s .3s cubic-bezier(.22,1,.36,1) both;
      transition: background .15s, transform .1s;
      width: 100%;
      justify-content: center;
    }

    .btn:active {
      background: #b82020;
      transform: scale(.97);
    }

    .btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .hint {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: .12em;
      color: rgba(200,205,212,.3);
      text-transform: uppercase;
      text-align: center;
      animation: textIn .6s .4s cubic-bezier(.22,1,.36,1) both;
    }
  </style>
</head>

<script>
  var INSTA_USER = 'is3dlab';
  var INSTA_WEB  = 'https://instagram.com/' + INSTA_USER;
  var ua = navigator.userAgent || '';
  var btn = document.getElementById('btn');

  // Monta a URL correta para cada plataforma
  if (/android/i.test(ua)) {
    btn.href = 'intent://instagram.com/' + INSTA_USER +
      '#Intent;scheme=https;package=com.instagram.android;' +
      'S.browser_fallback_url=' + encodeURIComponent(INSTA_WEB) + ';end';
  } else if (/iphone|ipad|ipod/i.test(ua)) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      window.location = 'instagram://user?username=' + INSTA_USER;
      setTimeout(function() {
        window.location = INSTA_WEB;
      }, 1600);
    });
  }
  // Desktop e outros: href já é INSTA_WEB por padrão
</script>
